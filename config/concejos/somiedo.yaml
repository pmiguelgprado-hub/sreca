# SRECA — segundo concejo, demuestra replicabilidad real (mismo software, otra config + clima).
# Somiedo: concejo de montaña, Reserva de la Biosfera, ganadería de vacuno → encaja con la
# sinergia (granjas lácteas + hogares). Recurso solar propio (PVGIS TMY, fixture aparte).
concejo: Somiedo

# Población: no incluida hasta confirmar cifra oficial INE (no se inventa un dato público).

# --- Recurso / planta FV ---
site:
  lat: 43.094       # N (Pola de Somiedo)
  lon: -6.255       # O
  tilt_deg: 35
  azimuth_deg: 180  # sur
pv:
  kwp: 15
  system_losses: 0.14
  noct_c: 45
  gamma_pmp_per_c: -0.0035

# --- Económico ---
prices:
  retail_eur_kwh: 0.20
  compensation_eur_kwh: 0.06

# --- Legal (RDL 7/2026) ---
legal:
  proximidad_max_m: 5000
  coefficient_mode: ex_ante

# --- Participantes sintéticos (perfiles parametrizables, ilustrativos) ---
participants:
  - id: mayor_diurno_1
    profile: residencial_mayor_diurno
    renta_priority: 3
    daily_kwh: 8.0
    flexible_loads: []
  - id: granja_lactea_1
    profile: ganadero_lacteo
    renta_priority: 1
    daily_kwh: 25.0
    # PLACEHOLDER sizing (no sourced) — ilustra la sinergia, pendiente datos reales.
    flexible_loads:
      - {name: tanque_frio_leche, energy_kwh: 6.0, duration_h: 3}
      - {name: acs_limpieza,      energy_kwh: 4.0, duration_h: 2}
  - id: granja_lactea_2
    profile: ganadero_lacteo
    renta_priority: 2
    daily_kwh: 22.0
    flexible_loads:
      - {name: tanque_frio_leche, energy_kwh: 5.0, duration_h: 3}
