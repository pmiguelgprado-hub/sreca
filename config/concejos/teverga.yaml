# SRECA — config del concejo piloto. Replicar = añadir otro YAML, sin tocar código.
# Cifras FV verificadas vía PVGIS (JRC, datos 2005-2020). Ver docs/2026-06-19-legal-verification-2026.md
concejo: Teverga

# --- Recurso / planta FV ---
site:
  lat: 43.16        # N
  lon: -6.09        # O (oeste negativo)
  tilt_deg: 35      # inclinación óptima sur
  azimuth_deg: 180  # sur
pv:
  kwp: 15
  system_losses: 0.14      # pérdidas lumped (PVGIS). PR resultante ≈ 0.765
  noct_c: 45               # NOCT módulo (°C) — modelo térmico Tcell
  gamma_pmp_per_c: -0.0035 # coef. temperatura potencia mono-Si (-0.35 %/°C)
# Sanity esperado (PVGIS 2026-06-20): ~17376 kWh/año, yield ~1158 kWh/kWp, PR ~0.795
# (calibración test integración; Ruta A = PVGIS TMY SARAH2+horizonte, ver docs/2026-06-20-calibration-source-discrepancy.md)

# --- Económico (precios parametrizables) ---
prices:
  retail_eur_kwh: 0.20        # coste evitado autoconsumo (valor del kWh autoconsumido)
  compensation_eur_kwh: 0.06  # compensación simplificada de excedentes (precio bajo)

# --- Legal (RDL 7/2026) ---
legal:
  proximidad_max_m: 5000      # 5 km (RDL 7/2026, antes 2 km)
  coefficient_mode: ex_ante   # ley vigente TED/1247/2021 (≥4 meses entre modificaciones)

# --- Participantes sintéticos MVP (perfiles parametrizables) ---
# renta_priority: prioridad en escasez (mayor = atendido antes). Misión social.
# flexible_loads: cargas desplazables a ventana solar. Ordeño NO va aquí (no-desplazable).
# daily_kwh = consumo base diario esperado (no-flexible) del participante (parametrizable).
participants:
  - id: mayor_diurno_1
    profile: residencial_mayor_diurno
    renta_priority: 3          # vulnerable → alta prioridad
    daily_kwh: 8.0             # hogar mayor, presente de día
    flexible_loads: []
  - id: mayor_diurno_2
    profile: residencial_mayor_diurno
    renta_priority: 3
    daily_kwh: 8.0
    flexible_loads: []
  - id: granja_lactea_1
    profile: ganadero_lacteo
    renta_priority: 1
    daily_kwh: 25.0           # base no-flexible (ordeño + casa); cargas flexibles aparte
    # PLACEHOLDER sizing (energy_kwh/duration_h NO sourced — Pablo confirma con datos
    # reales de la granja antes de cualquier claim). Estimaciones para demostrar la sinergia.
    flexible_loads:
      - {name: tanque_frio_leche, energy_kwh: 6.0, duration_h: 3}  # pre-enfriar en ventana solar
      - {name: acs_limpieza,      energy_kwh: 4.0, duration_h: 2}  # ACS limpieza, pre-calentar
    # ordeño = carga base no-desplazable, sigue en red (invariante sinergia §9.1)
